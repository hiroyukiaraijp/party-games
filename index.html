<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg); }
    .home-header {
      background: var(--gradient-header);
      padding: 1.2rem 1rem .8rem;
      text-align: center; color: #fff;
    }
    .home-header h1 { font-size: 1.4rem; letter-spacing: .08em; text-shadow: 0 2px 6px rgba(0,0,0,.15); }
    .home-header .subtitle { font-size: .75rem; color: rgba(255,255,255,.8); margin-top: .15rem; }

    /* Filter bar */
    .filter-bar {
      display: flex; gap: .3rem; padding: .6rem 1rem; overflow-x: auto;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-pill {
      padding: .25rem .7rem; font-size: .7rem; border-radius: 999px;
      border: 2px solid var(--surface2); background: var(--surface);
      color: var(--text-muted); cursor: pointer; font-family: inherit;
      font-weight: 600; white-space: nowrap; transition: all .15s;
      flex-shrink: 0;
    }
    .filter-pill:hover { border-color: var(--secondary); }
    .filter-pill.active {
      background: var(--gradient-btn); color: #fff; border-color: transparent;
    }

    /* App grid */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: .8rem .5rem;
      padding: .8rem 1rem 1.5rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .app-icon {
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    .app-icon .icon-box {
      width: 60px; height: 60px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; background: var(--surface);
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .15s;
    }
    .app-icon:hover .icon-box,
    .app-icon:active .icon-box {
      transform: scale(1.08);
      box-shadow: var(--shadow-hover);
    }
    .app-icon .icon-label {
      font-size: .6rem; font-weight: 700; margin-top: .3rem;
      text-align: center; line-height: 1.2; max-width: 80px;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .app-icon .icon-meta {
      font-size: .5rem; color: var(--text-muted); margin-top: .1rem;
    }

    /* Footer */
    .home-footer {
      text-align: center; padding: .5rem 1rem 2rem;
    }
    .reset-btn {
      background: none; border: 2px solid var(--surface2); color: var(--text-muted);
      padding: .3rem 1rem; border-radius: 999px; font-size: .7rem;
      font-family: inherit; font-weight: 600; cursor: pointer;
    }

    @media (min-width: 480px) {
      .app-grid { grid-template-columns: repeat(5, 1fr); }
      .app-icon .icon-box { width: 68px; height: 68px; font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header class="home-header">
    <h1>Party Games</h1>
    <p class="subtitle">みんなで楽しめる脳トレゲーム集</p>
  </header>

  <div class="filter-bar" id="filterBar">
    <button class="filter-pill active" data-filter="all" onclick="setFilter('all', this)">すべて</button>
    <button class="filter-pill" data-filter="freq" onclick="setFilter('freq', this)">よくプレイ</button>
    <button class="filter-pill" data-filter="1" onclick="setFilter('1', this)">1人OK</button>
    <button class="filter-pill" data-filter="2" onclick="setFilter('2', this)">2人〜</button>
    <button class="filter-pill" data-filter="3" onclick="setFilter('3', this)">3人〜</button>
    <button class="filter-pill" data-filter="lang" onclick="setFilter('lang', this)">言語系</button>
    <button class="filter-pill" data-filter="think" onclick="setFilter('think', this)">思考系</button>
    <button class="filter-pill" data-filter="reflex" onclick="setFilter('reflex', this)">反射・記憶</button>
  </div>

  <div class="app-grid" id="appGrid"></div>

  <div class="home-footer">
    <label style="display:inline-flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--text-muted);font-weight:600;cursor:pointer;margin-bottom:.5rem;">
      <input type="checkbox" id="rubyToggle" onchange="toggleRuby(this.checked)" style="width:16px;height:16px;">
      ふりがな表示
    </label>
    <br>
    <button class="reset-btn" onclick="resetAll()">プレイヤー・スコアをリセット</button>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const GAMES = [
      { id: 'word-slot', icon: '🎰', name: 'ワードスロット', min: 1, tags: ['lang'], href: 'games/word-slot/index.html' },
      { id: 'katakana-nashi', icon: '🚫', name: 'カタカナーシ', min: 2, tags: ['lang'], href: 'games/katakana-nashi/index.html' },
      { id: 'word-wolf', icon: '🐺', name: 'ワードウルフ', min: 3, tags: ['think'], href: 'games/word-wolf/index.html' },
      { id: 'master-game', icon: '👑', name: 'マスターゲーム', min: 2, tags: ['think'], href: 'games/master-game/index.html' },
      { id: 'number-expression', icon: '🎲', name: '数字deコトバ', min: 3, tags: ['lang', 'think'], href: 'games/number-expression/index.html' },
      { id: 'hint-bridge', icon: '🔗', name: '連想ブリッジ', min: 2, tags: ['lang'], href: 'games/hint-bridge/index.html' },
      { id: 'color-panic', icon: '🎨', name: 'カラーパニック', min: 1, tags: ['reflex'], href: 'games/color-panic/index.html' },
      { id: 'flash-memory', icon: '🧠', name: 'フラッシュメモリー', min: 1, tags: ['reflex'], href: 'games/flash-memory/index.html' },
      { id: 'rhythm-relay', icon: '🔔', name: 'リズムリレー', min: 1, tags: ['reflex'], href: 'games/rhythm-relay/index.html' },
      { id: 'reverse-dictionary', icon: '📖', name: '逆引き辞書クイズ', min: 1, tags: ['lang'], href: 'games/reverse-dictionary/index.html' },
      { id: 'puzzle-solver', icon: '🔍', name: 'ナゾトキ', min: 1, tags: ['think'], href: 'games/puzzle-solver/index.html' },
    ];

    const PLAY_COUNT_KEY = 'partygames_playcount';

    function getPlayCounts() {
      try { return JSON.parse(localStorage.getItem(PLAY_COUNT_KEY)) || {}; } catch { return {}; }
    }

    function trackPlay(gameId) {
      const counts = getPlayCounts();
      counts[gameId] = (counts[gameId] || 0) + 1;
      try { localStorage.setItem(PLAY_COUNT_KEY, JSON.stringify(counts)); } catch {}
    }

    let currentFilter = 'all';

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    }

    function renderGrid() {
      const counts = getPlayCounts();
      let filtered = [...GAMES];

      if (currentFilter === 'freq') {
        filtered.sort((a, b) => (counts[b.id] || 0) - (counts[a.id] || 0));
        filtered = filtered.filter(g => (counts[g.id] || 0) > 0);
        if (filtered.length === 0) filtered = [...GAMES]; // fallback
      } else if (currentFilter === '1') {
        filtered = filtered.filter(g => g.min <= 1);
      } else if (currentFilter === '2') {
        filtered = filtered.filter(g => g.min <= 2);
      } else if (currentFilter === '3') {
        filtered = filtered.filter(g => g.min >= 3);
      } else if (['lang', 'think', 'reflex'].includes(currentFilter)) {
        filtered = filtered.filter(g => g.tags.includes(currentFilter));
      }

      const grid = document.getElementById('appGrid');
      grid.innerHTML = filtered.map(g => {
        const plays = counts[g.id] || 0;
        const meta = g.min === 1 ? '1人〜' : `${g.min}人〜`;
        return `<a href="${g.href}" class="app-icon" onclick="trackPlay('${g.id}')">
          <div class="icon-box">${g.icon}</div>
          <div class="icon-label">${g.name}</div>
          <div class="icon-meta">${meta}${plays > 0 ? ' ・' + plays + '回' : ''}</div>
        </a>`;
      }).join('');
    }

    function resetAll() {
      if (!confirm('全ゲームのプレイヤーとスコアをリセットしますか？')) return;
      ['partygames_players','wordslot_state','katakananashi_state','wordwolf_state','mastergame_state','numberexpression_state','hintbridge_state','colorpanic_state','flashmemory_state','rhythmrelay_state','reversedictionary_state','puzzlesolver_state','partygames_playcount'].forEach(k => localStorage.removeItem(k));
      const el = document.getElementById('toast');
      el.textContent = 'リセットしました';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
      renderGrid();
    }

    function toggleRuby(on) {
      localStorage.setItem('partygames_ruby', on ? 'on' : 'off');
    }
    // Init toggle state
    document.getElementById('rubyToggle').checked = localStorage.getItem('partygames_ruby') === 'on';

    renderGrid();
  </script>
</body>
</html>
