<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Games - みんなでワイワイ!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <h1>Party Games</h1>
    <p class="subtitle">みんなでワイワイ大人数で楽しめるゲーム集</p>
  </header>

  <main class="game-grid">

    <a href="games/word-slot/index.html" class="game-card">
      <div class="card-icon">🎰</div>
      <div class="card-body">
        <h3>ワードスロット</h3>
        <p>文字数と頭文字がランダムに決まる！条件に合う単語を最速で叫べ！</p>
      </div>
      <div class="card-footer">
        <span>2人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

    <div class="game-card coming-soon">
      <div class="card-icon">🤌</div>
      <div class="card-body">
        <h3>ジェスチャークイズ</h3>
        <p>お題をジェスチャーだけで伝えよう！演技力と想像力の勝負！</p>
      </div>
      <div class="card-footer">
        <span>3人〜</span>
        <span class="badge coming">Coming Soon</span>
      </div>
    </div>

    <div class="game-card coming-soon">
      <div class="card-icon">🔢</div>
      <div class="card-body">
        <h3>ナンバーバトル</h3>
        <p>数字を使った心理戦！相手の数を予測して勝ち抜け！</p>
      </div>
      <div class="card-footer">
        <span>2人〜</span>
        <span class="badge coming">Coming Soon</span>
      </div>
    </div>

    <div class="game-card coming-soon">
      <div class="card-icon">💬</div>
      <div class="card-body">
        <h3>テーマトーク</h3>
        <p>ランダムなお題で盛り上がろう！意外な一面が見つかるかも？</p>
      </div>
      <div class="card-footer">
        <span>2人〜</span>
        <span class="badge coming">Coming Soon</span>
      </div>
    </div>

  </main>
</body>
</html>
