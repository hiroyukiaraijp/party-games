<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Games - みんなでワイワイ!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <h1>Party Games</h1>
    <p class="subtitle">みんなでワイワイ大人数で楽しめるゲーム集</p>
  </header>

  <main class="game-grid">

    <a href="games/word-slot/index.html" class="game-card">
      <div class="card-icon">🎰</div>
      <div class="card-body">
        <h3>ワードスロット</h3>
        <p>文字数と頭文字がランダムに決まる！条件に合う単語を最速で叫べ！</p>
      </div>
      <div class="card-footer">
        <span>2人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

    <a href="games/gesture-quiz/index.html" class="game-card">
      <div class="card-icon">🎭</div>
      <div class="card-body">
        <h3>ジェスチャーバトル</h3>
        <p>お題をジェスチャーで伝えろ！制限時間内にチームで何問正解できるか！</p>
      </div>
      <div class="card-footer">
        <span>4人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

    <a href="games/number-battle/index.html" class="game-card">
      <div class="card-icon">🔢</div>
      <div class="card-body">
        <h3>数字バトル</h3>
        <p>1〜100の中から数字を選べ！他の人と被らない最小の数字を狙え！</p>
      </div>
      <div class="card-footer">
        <span>3人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

    <a href="games/theme-talk/index.html" class="game-card">
      <div class="card-icon">💬</div>
      <div class="card-body">
        <h3>テーマトーク</h3>
        <p>ランダムなお題で30秒トーク！面白かった人にみんなで投票！</p>
      </div>
      <div class="card-footer">
        <span>3人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

  </main>
</body>
</html>
