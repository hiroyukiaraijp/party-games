<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Games - みんなでワイワイ!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <h1>Party Games</h1>
    <p class="subtitle">みんなでワイワイ大人数で楽しめるゲーム集</p>
  </header>

  <main class="game-grid">

    <a href="games/word-slot/index.html" class="game-card">
      <div class="card-icon">🎰</div>
      <div class="card-body">
        <h3>ワードスロット</h3>
        <p>文字数と頭文字がランダムに決まる！条件に合う単語を最速で叫べ！</p>
      </div>
      <div class="card-footer">
        <span>2人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

    <a href="games/katakana-nashi/index.html" class="game-card">
      <div class="card-icon">🚫</div>
      <div class="card-body">
        <h3>カタカナーシ</h3>
        <p>カタカナ語のお題をカタカナ抜きで説明！言い換え力が試される！</p>
      </div>
      <div class="card-footer">
        <span>2人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

    <a href="games/word-wolf/index.html" class="game-card">
      <div class="card-icon">🐺</div>
      <div class="card-body">
        <h3>ワードウルフ</h3>
        <p>1人だけ違うお題のウルフは誰だ？会話で探り合う心理戦！</p>
      </div>
      <div class="card-footer">
        <span>3人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

    <a href="games/master-game/index.html" class="game-card">
      <div class="card-icon">👑</div>
      <div class="card-body">
        <h3>マスターゲーム</h3>
        <p>マスターにYes/Noで質問してお題を当てろ！論理的に絞り込め！</p>
      </div>
      <div class="card-footer">
        <span>2人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

    <a href="games/number-expression/index.html" class="game-card">
      <div class="card-icon">🎲</div>
      <div class="card-body">
        <h3>数字deコトバ</h3>
        <p>秘密の数字を言葉で表現！みんなで協力して正しく並べよう！</p>
      </div>
      <div class="card-footer">
        <span>3人〜</span>
        <span class="badge">Play</span>
      </div>
    </a>

  </main>

  <div style="text-align:center;margin:1rem 0 2rem;">
    <button onclick="resetAll()" style="background:none;border:2px solid var(--surface2);color:var(--text-muted);padding:.4rem 1.2rem;border-radius:999px;font-size:.8rem;font-family:inherit;font-weight:600;cursor:pointer;">プレイヤー・スコアをリセット</button>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    function resetAll() {
      if (!confirm('全ゲームのプレイヤーとスコアをリセットしますか？')) return;
      ['partygames_players','wordslot_state','katakananashi_state','wordwolf_state','mastergame_state','numberexpression_state'].forEach(k => localStorage.removeItem(k));
      const el = document.getElementById('toast');
      el.textContent = 'リセットしました';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
