<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字バトル - Party Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .phase-info {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      margin: 1rem 0;
    }
    .number-input-area {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1rem 0;
    }
    .player-input-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 0;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }
    .player-input-row:last-child { border-bottom: none; }
    .player-input-row .name { min-width: 60px; font-weight: 600; flex-shrink: 0; }
    .player-input-row input { width: 70px; text-align: center; min-width: 0; flex-shrink: 1; }
    .player-input-row .btn { flex-shrink: 0; }
    .player-input-row .status { font-size: .85rem; color: var(--text-muted); flex-shrink: 0; }
    .player-input-row.submitted .status { color: #4caf50; }

    .reveal-area {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .reveal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .6rem 0;
      border-bottom: 1px solid #333;
      font-size: 1.1rem;
    }
    .reveal-row:last-child { border-bottom: none; }
    .reveal-row.winner { color: #4caf50; font-weight: 700; }
    .reveal-row.duplicate { color: var(--text-muted); text-decoration: line-through; }
    .reveal-row .num { font-weight: 900; font-size: 1.3rem; }

    .round-result {
      text-align: center;
      padding: 1.5rem;
      background: var(--surface);
      border-radius: var(--radius);
      margin: 1rem 0;
      border: 2px solid #4caf50;
    }
    .round-result .winner-name { font-size: 1.8rem; font-weight: 900; color: #4caf50; }

    .controls { text-align: center; margin: 1.5rem 0; display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }

    .range-display {
      text-align: center;
      margin: .5rem 0;
      color: var(--text-muted);
      font-size: .9rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="../../games.html"><h1>Party Games</h1></a>
    <p class="subtitle">数字バトル</p>
  </header>

  <div class="game-container">

    <details class="game-rules" open>
      <summary>遊び方</summary>
      <ul>
        <li>全員が<strong>1〜100</strong>の中から好きな数字を1つ選びます（秘密に！）</li>
        <li>全員が選んだら一斉公開！</li>
        <li><strong>他の人と被らない最小の数字</strong>を選んだ人が勝ち！</li>
        <li>全員被ったら引き分け。小さい数字は狙いやすいけど被りやすい！</li>
      </ul>
    </details>

    <!-- Player Setup -->
    <div class="player-setup" id="setupPhase">
      <h3>プレイヤー登録</h3>
      <div class="input-row">
        <input type="text" id="playerNameInput" placeholder="名前" maxlength="10"
               onkeydown="if(event.key==='Enter')addPlayer()">
        <button class="btn btn-primary btn-small" onclick="addPlayer()">追加</button>
      </div>
      <div style="margin-top:.8rem;">
        <label>数字の範囲: 1 〜
          <select id="maxNumber">
            <option value="10">10</option>
            <option value="30">30</option>
            <option value="50">50</option>
            <option value="100" selected>100</option>
          </select>
        </label>
      </div>
      <div class="player-list" id="playerList"></div>
    </div>

    <div class="phase-info" id="phaseInfo"></div>
    <div class="range-display" id="rangeDisplay"></div>

    <!-- Number Input Phase -->
    <div class="number-input-area" id="inputPhase" style="display:none;">
      <h3>数字を選んでね（こっそり！）</h3>
      <div id="playerInputs"></div>
    </div>

    <!-- Reveal Phase -->
    <div class="reveal-area" id="revealPhase" style="display:none;">
      <h3>結果発表！</h3>
      <div id="revealRows"></div>
    </div>

    <div class="round-result" id="roundResult" style="display:none;"></div>

    <div class="controls">
      <button class="btn btn-primary btn-large" id="startBtn" onclick="startRound()">ゲーム開始！</button>
      <button class="btn btn-primary btn-large" id="revealBtn" onclick="reveal()" style="display:none;">結果発表！</button>
      <button class="btn btn-secondary" id="nextBtn" onclick="nextRound()" style="display:none;">次のラウンド</button>
    </div>

    <div class="scoreboard" id="scoreboard" style="display:none;">
      <h3>通算スコア</h3>
      <div id="scoreRows"></div>
    </div>

  </div>

  <script>
    let players = [];
    let scores = {};
    let choices = {};
    let round = 0;
    let maxNum = 100;

    function addPlayer() {
      const input = document.getElementById('playerNameInput');
      const name = input.value.trim();
      if (!name || players.includes(name)) { input.value = ''; return; }
      players.push(name);
      scores[name] = 0;
      input.value = '';
      renderPlayers();
    }

    function removePlayer(name) {
      players = players.filter(p => p !== name);
      delete scores[name];
      renderPlayers();
    }

    function renderPlayers() {
      document.getElementById('playerList').innerHTML = players.map(p =>
        `<span class="player-tag">${esc(p)} <span class="remove" onclick="removePlayer('${esc(p)}')">&times;</span></span>`
      ).join('');
    }

    function startRound() {
      if (players.length < 2) { alert('2人以上必要です'); return; }
      maxNum = parseInt(document.getElementById('maxNumber').value);
      round++;
      choices = {};

      document.getElementById('phaseInfo').textContent = `ラウンド ${round} — 数字を選んでください`;
      document.getElementById('rangeDisplay').textContent = `1 〜 ${maxNum} の中から選んでね`;
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('revealBtn').style.display = '';
      document.getElementById('inputPhase').style.display = '';
      document.getElementById('revealPhase').style.display = 'none';
      document.getElementById('roundResult').style.display = 'none';

      document.getElementById('playerInputs').innerHTML = players.map(p => `
        <div class="player-input-row" id="row-${esc(p)}">
          <span class="name">${esc(p)}</span>
          <input type="number" id="input-${esc(p)}" min="1" max="${maxNum}" placeholder="?"
                 onfocus="this.type='password'" onblur="this.type='number'">
          <button class="btn btn-small btn-secondary" onclick="submitNumber('${esc(p)}')">決定</button>
          <span class="status" id="status-${esc(p)}">未入力</span>
        </div>
      `).join('');
    }

    function submitNumber(name) {
      const input = document.getElementById(`input-${name}`);
      const val = parseInt(input.value);
      if (isNaN(val) || val < 1 || val > maxNum) {
        alert(`1〜${maxNum}の数字を入力してください`);
        return;
      }
      choices[name] = val;
      input.disabled = true;
      input.type = 'password';
      const row = document.getElementById(`row-${name}`);
      row.classList.add('submitted');
      document.getElementById(`status-${name}`).textContent = '✅ 決定';

      // Check if all submitted
      if (Object.keys(choices).length === players.length) {
        document.getElementById('phaseInfo').textContent = 'みんな選んだ！結果発表ボタンを押してね';
      }
    }

    function reveal() {
      if (Object.keys(choices).length < players.length) {
        alert('全員がまだ入力していません');
        return;
      }

      document.getElementById('inputPhase').style.display = 'none';
      document.getElementById('revealPhase').style.display = '';
      document.getElementById('revealBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = '';

      // Find duplicates
      const numCount = {};
      players.forEach(p => {
        const n = choices[p];
        numCount[n] = (numCount[n] || 0) + 1;
      });

      // Sort by number chosen
      const sorted = [...players].sort((a, b) => choices[a] - choices[b]);

      // Find winner: smallest unique number
      let winner = null;
      for (const p of sorted) {
        if (numCount[choices[p]] === 1) { winner = p; break; }
      }

      document.getElementById('revealRows').innerHTML = sorted.map(p => {
        const isDup = numCount[choices[p]] > 1;
        const isWinner = p === winner;
        const cls = isWinner ? 'winner' : isDup ? 'duplicate' : '';
        return `<div class="reveal-row ${cls}">
          <span>${isWinner ? '👑 ' : ''}${esc(p)}${isDup ? ' (被り!)' : ''}</span>
          <span class="num">${choices[p]}</span>
        </div>`;
      }).join('');

      const result = document.getElementById('roundResult');
      if (winner) {
        scores[winner] = (scores[winner] || 0) + 1;
        result.innerHTML = `<div class="winner-name">👑 ${esc(winner)} の勝ち！</div>
          <div style="margin-top:.5rem;color:var(--text-muted)">被らない最小の数字 <strong>${choices[winner]}</strong> を選びました</div>`;
      } else {
        result.innerHTML = `<div style="font-size:1.3rem;font-weight:700;color:var(--primary)">全員被り！引き分け！</div>`;
      }
      result.style.display = '';

      document.getElementById('phaseInfo').textContent = `ラウンド ${round} — 結果`;
      renderScoreboard();
    }

    function nextRound() {
      startRound();
    }

    function renderScoreboard() {
      document.getElementById('scoreboard').style.display = '';
      const sorted = [...players].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
      document.getElementById('scoreRows').innerHTML = sorted.map((p, i) => {
        const medal = i === 0 && scores[p] > 0 ? '👑 ' : '';
        return `<div class="score-row">
          <span class="name">${medal}${esc(p)}</span>
          <span class="pts">${scores[p] || 0} pt</span>
        </div>`;
      }).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
