<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ナンバーラッシュ - asobi.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="particle-container" id="particles"></div>

  <div class="top-bar">
    <div class="title"><a href="../../games.html">asobi.dev</a> / <span data-ruby>ナンバーラッシュ</span></div>
    <div class="top-bar-actions">
      <button class="icon-btn" onclick="document.getElementById('helpModal').classList.add('show')">?</button>
    </div>
  </div>

  <div class="modal-overlay" id="helpModal" onclick="if(event.target===this)this.classList.remove('show')">
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('helpModal').classList.remove('show')">&times;</button>
      <h3 data-ruby>遊び方</h3>
      <ul>
        <li data-ruby>画面にランダム配置された<strong>数字</strong>を<strong>1から順番</strong>にタップ！</li>
        <li data-ruby>すべての数字をタップするまでの<strong>タイム</strong>を競います</li>
        <li data-ruby>間違った数字をタップすると<strong>0.5秒ペナルティ</strong>＋赤フラッシュ</li>
        <li data-ruby>マルチプレイでは1人ずつ挑戦し、全員のタイムをランキング</li>
        <li data-ruby>ソロでは自己ベスト更新のタイムアタック！</li>
      </ul>
      <h3 data-ruby style="margin-top:1rem;">鍛えられる力</h3>
      <ul>
        <li data-ruby><strong>処理速度</strong> — 素早く数字を見つけてタップする力</li>
        <li data-ruby><strong>視覚探索</strong> — グリッドの中から目的の数字を見つける力</li>
        <li data-ruby><strong>注意力</strong> — 正確にタップし続ける集中力</li>
      </ul>
    </div>
  </div>

  <div class="game-page">
    <div id="setupPhase">
      <div class="setup-section">
        <h4 data-ruby>プレイヤー</h4>
        <div id="playerList"></div>
        <button class="start-btn" onclick="startGame()">🔢 スタート！</button>
      </div>
    </div>

    <!-- Game Phase -->
    <div id="gamePhase" style="display:none;">
      <div class="phase-section">
        <div class="game-info-bar">
          <div class="next-number" id="nextNumber" data-ruby>次: <span id="nextNumberValue">1</span></div>
          <div class="timer-display" id="timerDisplay">0.000</div>
        </div>
        <div class="number-grid" id="numberGrid"></div>
      </div>
    </div>

    <!-- Result Phase (per player) -->
    <div id="resultPhase" style="display:none;">
      <div class="phase-section result-section">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-details" id="resultDetails"></div>
        <div id="resultExtra"></div>
        <button class="btn btn-primary next-btn" id="nextBtn" onclick="nextRound()" data-ruby>もう1回！</button>
      </div>
    </div>

    <!-- Final Ranking Phase -->
    <div id="finalPhase" style="display:none;">
      <div class="phase-section result-section">
        <div class="result-icon" id="finalIcon"></div>
        <div class="result-title" id="finalTitle"></div>
        <div id="finalRanking"></div>
        <div id="finalExtra"></div>
        <button class="btn btn-primary next-btn" onclick="backToSetup()" data-ruby>もう1回！</button>
      </div>
    </div>

    <div class="score-section" id="scoreboard" style="display:none;">
      <h4>Score</h4>
      <div class="score-list" id="scoreRows"></div>
    </div>
    <div class="log-section" id="answerLog" style="display:none;">
      <div class="log-header"><h4>Log</h4><button class="clear-log-btn" onclick="clearAllLogs()" data-ruby>消去</button></div>
      <div id="logEntries"></div>
    </div>
  </div>
  <script src="../../js/auto-ruby.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../js/firebase-config.js"></script>
  <script src="../../js/profile.js"></script>
  <script src="../../js/shared.js"></script>
  <script src="game.js"></script>
</body>
</html>
