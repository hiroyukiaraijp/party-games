<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テーマトーク - Party Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .theme-display {
      background: var(--surface);
      border: 3px solid var(--primary);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      margin: 1.5rem 0;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .theme-display .label { font-size: .85rem; color: var(--text-muted); margin-bottom: .5rem; }
    .theme-display .theme-text { font-size: 1.8rem; font-weight: 900; line-height: 1.4; }

    .speaker-display {
      text-align: center;
      font-size: 1.3rem;
      margin: 1rem 0;
    }
    .speaker-display .name { color: var(--primary); font-weight: 900; font-size: 1.5rem; }

    .timer-display {
      text-align: center;
      font-size: 4rem;
      font-weight: 900;
      margin: .5rem 0;
      font-variant-numeric: tabular-nums;
    }
    .timer-display.warning { color: var(--primary); animation: pulse .5s infinite alternate; }
    @keyframes pulse { to { opacity: .5; } }
    .timer-bar { height: 6px; margin: 0 0 1rem; }

    .controls { text-align: center; margin: 1.5rem 0; display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }

    .vote-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .vote-section h3 { margin-bottom: .8rem; }
    .vote-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: .5rem;
    }
    .vote-btn {
      background: var(--surface2);
      border: 2px solid #444;
      border-radius: var(--radius);
      padding: .8rem;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
      color: var(--text);
      font-size: 1rem;
    }
    .vote-btn:hover { border-color: var(--primary); background: rgba(233,69,96,.1); }
    .vote-btn.selected { border-color: var(--primary); background: rgba(233,69,96,.2); }

    .round-counter {
      text-align: center;
      color: var(--text-muted);
      font-size: .9rem;
      margin: .5rem 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="../../index.html"><h1>Party Games</h1></a>
    <p class="subtitle">テーマトーク</p>
  </header>

  <div class="game-container">

    <details class="game-rules" open>
      <summary>遊び方</summary>
      <ul>
        <li>ランダムなお題が表示されます</li>
        <li>指名されたプレイヤーが<strong>30秒間</strong>お題についてトーク！</li>
        <li>全員がトークしたら、<strong>一番面白かった人に投票</strong>！</li>
        <li>票が多い人ほどポイント獲得！</li>
      </ul>
    </details>

    <!-- Player Setup -->
    <div class="player-setup" id="setupPhase">
      <h3>プレイヤー登録</h3>
      <div style="display:flex; gap:.5rem; margin-top:.5rem;">
        <input type="text" id="playerNameInput" placeholder="名前" maxlength="10"
               onkeydown="if(event.key==='Enter')addPlayer()">
        <button class="btn btn-primary btn-small" onclick="addPlayer()">追加</button>
      </div>
      <div style="margin-top:.8rem;">
        <label>トーク時間:
          <select id="talkTime">
            <option value="15">15秒</option>
            <option value="30" selected>30秒</option>
            <option value="45">45秒</option>
            <option value="60">60秒</option>
          </select>
        </label>
      </div>
      <div class="player-list" id="playerList"></div>
    </div>

    <!-- Game Display -->
    <div class="round-counter" id="roundCounter"></div>
    <div class="speaker-display" id="speakerDisplay" style="display:none;">
      トークする人: <span class="name" id="speakerName"></span>
    </div>

    <div class="theme-display" id="themeDisplay" style="display:none;">
      <div class="label">お題</div>
      <div class="theme-text" id="themeText"></div>
    </div>

    <div class="timer-display" id="timer" style="display:none;">30</div>
    <div class="timer-bar" id="timerBar" style="display:none;"><div class="fill" id="timerFill"></div></div>

    <div class="controls">
      <button class="btn btn-primary btn-large" id="startBtn" onclick="startGame()">ゲーム開始！</button>
      <button class="btn btn-primary btn-large" id="talkBtn" onclick="startTalk()" style="display:none;">トーク開始！</button>
      <button class="btn btn-secondary" id="nextBtn" onclick="nextSpeaker()" style="display:none;">次の人へ</button>
    </div>

    <!-- Voting -->
    <div class="vote-section" id="voteSection" style="display:none;">
      <h3>投票タイム！一番面白かった人は？</h3>
      <div class="vote-grid" id="voteGrid"></div>
      <div style="text-align:center; margin-top:1rem;">
        <button class="btn btn-primary" onclick="submitVotes()">投票確定！</button>
      </div>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard" id="scoreboard" style="display:none;">
      <h3>スコアボード</h3>
      <div id="scoreRows"></div>
    </div>

  </div>

  <script>
    const THEMES = [
      '人生で一番恥ずかしかった体験',
      '無人島に1つだけ持っていくなら',
      '100万円あったら何に使う？',
      'もし透明人間になれたら何する？',
      '朝起きたら動物になってた！何になりたい？',
      '自分の取扱説明書を紹介して',
      '人生最大のピンチ',
      'タイムマシンで行きたい時代と理由',
      '自分を食べ物に例えると？',
      '最近ハマっていること',
      '地球最後の日に何を食べる？',
      'もし総理大臣になったら最初にすること',
      '子供の頃の夢 vs 今の夢',
      'AIに絶対負けないと思う自分の能力',
      '1ヶ月間同じものしか食べられないなら',
      '生まれ変わるなら何になりたい？',
      '宝くじ10億円当たったら会社辞める？',
      '自分の長所を全力で自慢して',
      'もしYouTuberになるならどんなチャンネル？',
      '一番やらかした失敗談',
      '好きな人に告白するセリフを即興で',
      '30秒でこの商品をプレゼンして（目の前にあるもの）',
      '自分のテーマソングを紹介（アカペラOK）',
      '10年後の自分に手紙を書くなら',
      'もし超能力が1つ使えるなら',
      '寝る前に絶対やること',
      '人に言えない変なクセ',
      '嫌いな食べ物を美味しそうにプレゼンして',
      '3日間休みなら何する？具体的に',
      'もしもしゃべる動物が1匹だけ飼えるなら',
      '今日のラッキーアイテムを即興で決めて理由も',
      '推しを30秒で布教して',
      'ありえない言い訳を本気で言ってみて',
      '異世界転生したらどんな能力が欲しい？',
      '自分の人生をドラマにするならタイトルは？',
      'この中で一番〇〇な人は？（お題自由）',
      '即興で俳句を詠んで',
      '実は誰にも言ってないこと',
      '明日世界が終わるなら今日何する？',
      '自分の必殺技の名前とポーズを決めて',
    ];

    let players = [];
    let scores = {};
    let speakerIndex = 0;
    let talkDuration = 30;
    let timerInterval = null;
    let currentRound = 0;
    let usedThemes = [];
    let selectedVote = null;

    function addPlayer() {
      const input = document.getElementById('playerNameInput');
      const name = input.value.trim();
      if (!name || players.includes(name)) { input.value = ''; return; }
      players.push(name);
      scores[name] = 0;
      input.value = '';
      renderPlayers();
    }

    function removePlayer(name) {
      players = players.filter(p => p !== name);
      delete scores[name];
      renderPlayers();
    }

    function renderPlayers() {
      document.getElementById('playerList').innerHTML = players.map(p =>
        `<span class="player-tag">${esc(p)} <span class="remove" onclick="removePlayer('${esc(p)}')">&times;</span></span>`
      ).join('');
    }

    function getRandomTheme() {
      if (usedThemes.length >= THEMES.length) usedThemes = [];
      let available = THEMES.filter(t => !usedThemes.includes(t));
      const theme = available[Math.floor(Math.random() * available.length)];
      usedThemes.push(theme);
      return theme;
    }

    function startGame() {
      if (players.length < 2) { alert('2人以上必要です'); return; }
      talkDuration = parseInt(document.getElementById('talkTime').value);
      currentRound++;
      speakerIndex = 0;

      // Shuffle player order
      for (let i = players.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [players[i], players[j]] = [players[j], players[i]];
      }

      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('voteSection').style.display = 'none';
      showSpeaker();
    }

    function showSpeaker() {
      const p = players[speakerIndex];
      const theme = getRandomTheme();

      document.getElementById('roundCounter').textContent =
        `ラウンド ${currentRound} — ${speakerIndex + 1}/${players.length}人目`;
      document.getElementById('speakerDisplay').style.display = '';
      document.getElementById('speakerName').textContent = p;
      document.getElementById('themeDisplay').style.display = '';
      document.getElementById('themeText').textContent = theme;
      document.getElementById('timer').style.display = 'none';
      document.getElementById('timerBar').style.display = 'none';
      document.getElementById('talkBtn').style.display = '';
      document.getElementById('nextBtn').style.display = 'none';
    }

    function startTalk() {
      document.getElementById('talkBtn').style.display = 'none';
      document.getElementById('timer').style.display = '';
      document.getElementById('timerBar').style.display = '';

      let timeLeft = talkDuration;
      const total = talkDuration;
      document.getElementById('timer').textContent = timeLeft;
      document.getElementById('timer').classList.remove('warning');
      document.getElementById('timerFill').style.width = '100%';

      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;
        document.getElementById('timerFill').style.width = `${(timeLeft / total) * 100}%`;
        if (timeLeft <= 5) document.getElementById('timer').classList.add('warning');
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          document.getElementById('timer').textContent = "TIME UP!";
          document.getElementById('nextBtn').style.display = '';
        }
      }, 1000);
    }

    function nextSpeaker() {
      clearInterval(timerInterval);
      speakerIndex++;

      if (speakerIndex >= players.length) {
        // All done — vote
        startVoting();
        return;
      }
      showSpeaker();
    }

    function startVoting() {
      document.getElementById('speakerDisplay').style.display = 'none';
      document.getElementById('themeDisplay').style.display = 'none';
      document.getElementById('timer').style.display = 'none';
      document.getElementById('timerBar').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('roundCounter').textContent = `ラウンド ${currentRound} — 投票`;

      selectedVote = null;
      document.getElementById('voteSection').style.display = '';
      document.getElementById('voteGrid').innerHTML = players.map(p =>
        `<button class="vote-btn" onclick="selectVote(this, '${esc(p)}')">${esc(p)}</button>`
      ).join('');
    }

    function selectVote(btn, name) {
      document.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedVote = name;
    }

    function submitVotes() {
      if (!selectedVote) { alert('投票先を選んでください'); return; }
      scores[selectedVote] = (scores[selectedVote] || 0) + 1;

      document.getElementById('voteSection').style.display = 'none';
      document.getElementById('startBtn').style.display = '';
      document.getElementById('startBtn').textContent = '次のラウンド！';
      document.getElementById('roundCounter').textContent =
        `ラウンド ${currentRound} — ${selectedVote} に1票！`;

      renderScoreboard();
    }

    function renderScoreboard() {
      document.getElementById('scoreboard').style.display = '';
      const sorted = [...players].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
      document.getElementById('scoreRows').innerHTML = sorted.map((p, i) => {
        const medal = i === 0 && scores[p] > 0 ? '👑 ' : '';
        return `<div class="score-row">
          <span class="name">${medal}${esc(p)}</span>
          <span class="pts">${scores[p] || 0} 票</span>
        </div>`;
      }).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
