<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>空気読みスケール - asobi.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="particle-container" id="particles"></div>

  <div class="top-bar">
    <div class="title"><a href="../../games.html">asobi.dev</a> / <span>空気読みスケール</span></div>
    <div class="top-bar-actions"><button class="icon-btn" onclick="document.getElementById('helpModal').classList.add('show')">?</button></div>
  </div>

  <div class="modal-overlay" id="helpModal" onclick="if(event.target===this)this.classList.remove('show')">
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('helpModal').classList.remove('show')">&times;</button>
      <h3 data-ruby>遊び方</h3>
      <ul>
        <li data-ruby>お題に対して<strong>1〜100のスライダー</strong>で自分の感覚を回答</li>
        <li data-ruby>全員の回答後、一斉に結果を公開！</li>
        <li data-ruby>グループの<strong>中央値に最も近い人</strong>が得点</li>
        <li data-ruby>正解はない！「みんなの普通」を読め！</li>
      </ul>
      <h3 data-ruby style="margin-top:1rem;">鍛えられる力</h3>
      <ul>
        <li data-ruby><strong>メタ認知</strong> — 自分の感覚と他者の感覚のズレを認識する力</li>
        <li data-ruby><strong>社会的推論</strong> — 他者がどう感じるかを推測する力</li>
      </ul>
    </div>
  </div>

  <div class="game-page">
    <div id="setupPhase">
      <div class="setup-section">
        <h4>プレイヤー</h4>
        <div class="player-bar">
          <input type="text" id="playerNameInput" placeholder="名前" maxlength="10" onkeydown="if(event.key==='Enter')addPlayer()">
          <button class="btn btn-primary btn-small" onclick="addPlayer()">追加</button>
        </div>
        <div class="player-tags" id="playerList"></div>
        <button class="start-btn" onclick="startGame()">🎯 スタート！</button>
      </div>
    </div>

    <!-- Input Phase (pass around) -->
    <div id="inputPhase" style="display:none;">
      <div class="phase-section">
        <div class="topic-display" id="topicDisplay"></div>
        <div class="scale-labels"><span id="labelLow"></span><span id="labelHigh"></span></div>
        <div class="confirm-progress" id="inputDots"></div>
        <div class="confirm-instruction">スマホを渡してください</div>
        <div class="confirm-player" id="inputPlayer"></div>
        <div class="slider-area">
          <input type="range" id="slider" min="1" max="100" value="50" oninput="updateSlider()">
        </div>
        <div class="slider-value" id="sliderValue">50</div>
        <button class="btn btn-primary confirm-btn" onclick="submitValue()">決定 → 次の人へ</button>
      </div>
    </div>

    <!-- Result Phase -->
    <div id="resultPhase" style="display:none;">
      <div class="phase-section result-section">
        <div class="topic-display" id="resultTopic"></div>
        <div class="result-bar-container">
          <div class="result-bar" id="resultBar"></div>
        </div>
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-details" id="resultDetails"></div>
        <button class="btn btn-primary next-btn" onclick="nextRound()">次のお題 →</button>
      </div>
    </div>

    <div class="score-section" id="scoreboard" style="display:none;">
      <h4>Score</h4><div class="score-list" id="scoreRows"></div>
    </div>
    <div class="log-section" id="answerLog" style="display:none;">
      <div class="log-header"><h4>Log</h4><button class="clear-log-btn" onclick="clearAllLogs()">消去</button></div>
      <div id="logEntries"></div>
    </div>
  </div>
  <script src="../../js/auto-ruby.js"></script>
  <script src="game.js"></script>
</body>
</html>
